name: MavadoClaw CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run Python syntax check
        run: python -m py_compile app.py

      - name: Run plugin syntax checks
        run: |
          python -m py_compile plugins/__init__.py
          python -m py_compile plugins/ai_infrastructure.py
          python -m py_compile plugins/omniroute_plugin/__init__.py
          python -m py_compile plugins/omniroute_plugin/omniroute_client.py
          python -m py_compile plugins/ninerouter_plugin/__init__.py
          python -m py_compile plugins/ninerouter_plugin/ninerouter_client.py
          python -m py_compile plugins/openhands_team/__init__.py
          python -m py_compile plugins/openhands_team/openhands_team.py
          python -m py_compile plugins/cloudflare_edge/__init__.py
          python -m py_compile plugins/cloudflare_edge/edge_client.py
          python -m py_compile plugins/hf_spaces/__init__.py
          python -m py_compile plugins/hf_spaces/hf_client.py
          python -m py_compile plugins/lightning_ai/__init__.py
          python -m py_compile plugins/lightning_ai/lightning_client.py

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build --target mavado -t mavado:latest .

      - name: Test Docker image
        run: |
          docker run -d --name test-mavado -p 8080:8080 mavado:latest
          sleep 10
          curl -f http://localhost:8080/health || exit 1
          docker stop test-mavado
          docker rm test-mavado

  deploy-hf:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: huggingface

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          if [ -n "$HF_TOKEN" ]; then
            pip install huggingface_hub
            huggingface-cli login --token $HF_TOKEN
            echo "Deploying to HuggingFace Spaces..."
          else
            echo "HF_TOKEN not set, skipping HF deployment"
          fi

  deploy-cf:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: cloudflare

    steps:
      - uses: actions/checkout@v4

      - name: Deploy Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            cd cloudflare-worker
            npm install -g wrangler
            wrangler deploy
          else
            echo "CLOUDFLARE_API_TOKEN not set, skipping CF deployment"
          fi
