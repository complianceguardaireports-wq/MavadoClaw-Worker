services:
  # ==================== Backend API ====================
  - type: web
    name: mavadoclaw-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 8080

  # ==================== Gradio Frontend ====================
  - type: web
    name: mavadoclaw-frontend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r hf-space/requirements.txt
    startCommand: cd hf-space && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MAVADOCLAW_API_URL
        value: https://mavadoclaw-backend.onrender.com

  # ==================== OmniRoute AI Gateway ====================
  - type: web
    name: omniroute
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile.omniroute
    envVars:
      - key: PORT
        value: 20128
      - key: OMNIROUTE_MEMORY_MB
        value: 512

  # ==================== 9Router Backup ====================
  - type: web
    name: ninerouter
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile.ninerouter
    envVars:
      - key: PORT
        value: 20128
