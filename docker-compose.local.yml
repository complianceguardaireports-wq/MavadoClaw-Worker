# MavadoClaw-Worker Docker Compose - Local Development
# Services: OmniRoute (port 3000), 9Router (port 8081), OpenHands (port 3001), MavadoClaw (port 8080)

services:
  # ==================== OmniRoute - Primary AI Gateway ====================
  omniroute:
    image: node:20-slim
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - ./omniroute:/app
    environment:
      NODE_ENV: production
      PORT: "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - mavado-net

  # ==================== 9Router - Backup Router ====================
  9router:
    image: node:20-slim
    ports:
      - "8081:8081"
    working_dir: /app
    volumes:
      - ./9router:/app
    environment:
      NODE_ENV: production
      PORT: "8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - mavado-net

  # ==================== OpenHands - AI Coding Agent ====================
  openhands:
    image: docker.all-hands.dev/all-hands/openhands:main
    ports:
      - "3001:3001"
    working_dir: /workspace
    volumes:
      - openhands_data:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      PYTHONUNBUFFERED: "1"
      WORKSPACE_BASE: /workspace
      SANDBOX_RUNTIME_CONTAINER_IMAGE: docker.all-hands.dev/all-hands/runtime:0.23-nikolaik
      LLM_API_KEY: not-needed
      LLM_MODEL: auto
      LLM_BASE_URL: http://omniroute:3000/v1
      LITELLM_LOCAL_MODEL_COST_MAP: "True"
      OPENHANDS_API_KEY: not-needed
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - mavado-net

  # ==================== MavadoClaw - CEO/Orchestrator ====================
  mavado:
    build:
      context: .
      dockerfile: Dockerfile
      target: mavado
    ports:
      - "8080:8080"
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      PYTHONUNBUFFERED: "1"
      PORT: "8080"
      HOSTNAME: "0.0.0.0"
      OMNIROUTE_URL: http://omniroute:3000
      NINEROUTER_URL: http://9router:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      omniroute:
        condition: service_healthy
      9router:
        condition: service_healthy
      openhands:
        condition: service_started
    networks:
      - mavado-net

volumes:
  openhands_data:

networks:
  mavado-net:
    driver: bridge
